<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registration form</title><link rel="stylesheet" href="form.css">
</head>
<body>
    <form action="">
        <div class="logo">
            <img src="images/logo.png" alt="">
        </div>
        <div class="create">
            <h1>Create an Account</h1>
            <p>Start exploring and utilising all the resources that will <br>help you elevate every design you make</p>
        </div><br>
        <div class="name">
            <label for="">Name</label><br>
            <input type="text" placeholder="Your name">
        </div><br>
        <div class="mail">
            <label for="">Email</label><br>
            <input type="text" placeholder="Your email">
        </div><br>
        <div class="password">
            <label for="">Password</label><br>
            <input type="password" placeholder="Create a password" maxlength="16" >
        </div><br>
        <div class="Account">
            <button>Create Account</button>
            <!-- <input type="checkbox" name="" id="" class="check">
            <input type="date" name="" id="">
            <input type="file" name="" id=""> -->
        </div>
        
    </form>
    <script src="form.js"></script>
</body>
</html>
