<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registration form</title><link rel="stylesheet" href="form.css">
</head>
<body>
    <form action="">
        <div class="logo">
            <img src="images/logo.png" alt="Logo">
        </div>
        <div class="create">
            <h1>Create an Account</h1>
            <p>Start exploring and utilising all the resources that will help you elevate every design you make</p>
        </div>
        <div class="name">
            <label for="name">Name</label>
            <input type="text" id="name" placeholder="Your name">
        </div>
        <div class="mail">
            <label for="email">Email</label>
            <input type="email" id="email" placeholder="Your email">
        </div>
        <div class="password">
            <label for="password">Password</label>
            <input type="password" id="password" placeholder="Create a password" maxlength="16">
        </div>
        <div class="Account">
            <button type="button">Create Account</button>
        </div>
    </form>
    <script src="form.js"></script>
</body>
</html>
